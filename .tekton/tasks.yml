apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: nose-test
spec:
  steps:
    - name: install
      image: python:3.8
      script: |
        pip install nose

    - name: nose-test
      image: python:3.8
      script: |
        nosetests

---
apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: cleanup
spec:
  steps:
    - name: cleanup
      image: python:3.8
      script: |
        echo "Cleaning up..."
        rm -rf __pycache__
